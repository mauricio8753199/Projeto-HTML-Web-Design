<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Sistema</title>
</head>
<body>
    <h1>Cadastro de Usuário</h1>
    <form>
        <label for="nome">Nome Completo:</label>
        <br>
        <input type="text" id="nome">
        <br> <br>
        <label for="email">Email:</label>
        <br>
        <input type="text" id="email">
        <br> <br>
        <label for="senha">Senha:</label>
        <br>
        <input type="password" id="senha">
        <br> <br>
        <label for="confirmar-senha">Confirmar Senha:</label>
        <br>
        <input type="password" id="confirmar-senha">
        <br> <br>
        <label for="data-nascimento">Data de Nascimento:</label>
        <br>
        <input type="date" id="data-nascimento">
        <br> <br>
        <label for="genero">Gênero:</label>
        <br>
        <input type="radio" name="genero" id="genero"> Masculino
        <br>
        <input type="radio" name="genero"> Feminino
        <br>
        <input type="radio" name="genero"> Outro
        <br> <br>
        <label for="interesses">Interesses:</label>
        <br>
        <input type="checkbox" name="tecnologia" id="interesses"> Tecnologia
        <br>
        <input type="checkbox" name="esportes"> Esportes
        <br>
        <input type="checkbox" name="musica"> Música
        <br><br>
        <label for="pais">País:</label>
        <br>
        <select id="pais">
            <option value="Brasil">Brasíl</option>
        </select>
        <br> <br>
        <input type="checkbox"> Aceito os termos de uso
        <br><br>
        <a href="#">
            <input type="button" value="Criar Conta">
        </a>
        <br><br>
        <a href="#">Já tenho conta</a>
        <br><br>
        <a href="login.html">
            <input type="button" value="Voltar para Login">
        </a>
    </form>
</body>
</html>
